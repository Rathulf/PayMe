{% extends 'payroll/base_auth.html' %}

{% block title %}Register - PayMe{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="text-center mb-3">
        <h3 class="fw-bold text-dark m-0">Create Your Account</h3>
        <p class="text-muted small">Sign up for your PayMe account access</p>
    </div>

    <form method="POST" action="{% url 'register' %}" autocomplete="off">
        {% csrf_token %}

        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="auth-input" required>

        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="auth-input" required>

        <label for="id_password_confirm">Password confirmation</label>
        <input type="password" name="password_confirmation" id="id_password_confirm" class="auth-input" required>

        <label for="id_first_name">First name</label>
        <input type="text" name="first_name" id="id_first_name" class="auth-input" required>

        <label for="id_last_name">Last name</label>
        <input type="text" name="last_name" id="id_last_name" class="auth-input" required>

        <label for="id_email">Email</label>
        <input type="email" name="email" id="id_email" class="auth-input" required>

        <label for="id_contact_no">Contact no</label>
        <input type="text" name="contact_no" id="id_contact_no" class="auth-input" required>

        <button type="submit" class="auth-btn-main">REGISTER</button>
    </form>

    <a href="{% url 'login' %}" class="auth-link">Already have an account? Login</a>
</div>
{% endblock %}
