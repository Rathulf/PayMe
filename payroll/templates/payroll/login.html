{% extends 'base.html' %}

{% block title %}PayMe - Login{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <h2 class="fw-bold text-primary m-0">PayMe</h2>
    <p class="text-muted small">Payroll Management System</p>
</div>

<form method="POST" autocomplete="off">
    {% csrf_token %}

    <div class="mb-3">
        <label for="username" class="form-label small fw-semibold text-secondary">Username</label>
        <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" autocomplete="off" required>
    </div>

    <div class="mb-3">
        <label for="password" class="form-label small fw-semibold text-secondary">Password</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-2">LOGIN</button>
</form>

<div class="text-center mt-4">
    <span class="text-muted small">Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Create an Account</a></span>
</div>
{% endblock %}
