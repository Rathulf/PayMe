<div class="sidebar d-flex flex-column p-4 justify-content-between position-sticky top-0" style="height: 100vh;">
    <div>
        <div class="d-flex align-items-center gap-2 py-3 border-bottom border-secondary border-opacity-25 mb-4">
            <div class="bg-success rounded-3 p-2 d-inline-flex text-white btn-emerald-prime">
                <i class="bi bi-wallet2 fs-4"></i>
            </div>
            <h3 class="fw-bold text-white tracking-tight m-0">PayMe<span class="text-success">.</span></h3>
        </div>

        <ul class="nav nav-pills flex-column gap-1">
            <li>
                <a href="{% url 'admin_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
                    <i class="bi bi-grid-1x2-fill me-2"></i> Console
                </a>
            </li>
            <li>
                <a href="{% url 'manage_employees' %}" class="nav-link {% if request.resolver_match.url_name == 'manage_employees' %}active{% endif %}">
                    <i class="bi bi-person-badge me-2"></i> Roster Registry
                </a>
            </li>
            <li>
                <a href="{% url 'payroll_computation' %}" class="nav-link {% if request.resolver_match.url_name == 'payroll_computation' %}active{% endif %}">
                    <i class="bi bi-calculator-fill me-2"></i> Run Payroll
                </a>
            </li>
            <li>
                <a href="{% url 'leave_manager' %}" class="nav-link {% if request.resolver_match.url_name == 'leave_manager' %}active{% endif %}">
                    <i class="bi bi-calendar-range me-2"></i> Leave Manager
                </a>
            </li>
            <li>
                <a href="{% url 'admin_payslips' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_payslips' %}active{% endif %}">
                    <i class="bi bi-file-earmark-check me-2"></i> Payslips
                </a>
            </li>

            {% if request.user.profile.role == 'superadmin' %}
            <li>
                <a href="{% url 'admin_reports' %}" class="nav-link {% if request.resolver_match.url_name == 'admin_reports' %}active{% endif %}">
                    <i class="bi bi-graph-up-arrow me-2"></i> Audits & Reports
                </a>
            </li>
            {% endif %}
        </ul>
    </div>

    <div class="pt-3 border-top border-secondary border-opacity-25">
        <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm w-100 fw-bold border-0 py-2">
            <i class="bi bi-box-arrow-left me-1"></i> Logout
        </a>
    </div>
</div>
