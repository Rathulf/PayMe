<div class="sidebar d-flex flex-column" style="width: 250px; background-color: #222e35; height: 100vh;">

    <!-- Branding / Logo -->
    <div class="sidebar-brand p-4 d-flex align-items-center border-bottom border-secondary mb-3">
        <div class="brand-icon me-2 rounded text-center" style="background-color: #10b981; width: 35px; height: 35px; line-height: 35px;">
            <i class="bi bi-wallet2 text-white"></i>
        </div>
        <h3 class="text-white m-0 fw-bold">PayMe<span style="color: #10b981;">.</span></h3>
    </div>

    <!-- Navigation Menu -->
    <div class="sidebar-nav d-flex flex-column px-3 gap-2 flex-grow-1 mt-2">

        <!-- Console: Dynamically routes Admin vs Staff based on your urls.py -->
        {% if user.is_staff or user.is_superuser %}
            <a href="{% url 'admin_dashboard' %}" class="nav-link text-light py-2 px-3 rounded {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-success{% endif %}">
                <i class="bi bi-grid-1x2 me-2"></i> Console
            </a>
        {% else %}
            <a href="{% url 'staff_dashboard' %}" class="nav-link text-light py-2 px-3 rounded {% if request.resolver_match.url_name == 'staff_dashboard' %}bg-success{% endif %}">
                <i class="bi bi-grid-1x2 me-2"></i> Console
            </a>
        {% endif %}

        <!-- Leave Manager: Available to everyone -->
        <a href="{% url 'leave_manager' %}" class="nav-link text-light py-2 px-3 rounded {% if request.resolver_match.url_name == 'leave_manager' %}bg-success{% endif %}">
            <i class="bi bi-calendar-check me-2"></i> Leave Manager
        </a>

        <!-- Restricted Links (Admin Only) -->
        {% if user.is_staff or user.is_superuser %}
            <a href="{% url 'manage_employees' %}" class="nav-link text-light py-2 px-3 rounded {% if request.resolver_match.url_name == 'manage_employees' %}bg-success{% endif %}">
                <i class="bi bi-person-badge me-2"></i> Roster Registry
            </a>

            <a href="{% url 'payroll_computation' %}" class="nav-link text-light py-2 px-3 rounded {% if request.resolver_match.url_name == 'payroll_computation' %}bg-success{% endif %}">
                <i class="bi bi-calculator me-2"></i> Run Payroll
            </a>

            <a href="{% url 'admin_payslips' %}" class="nav-link text-light py-2 px-3 rounded {% if request.resolver_match.url_name == 'admin_payslips' %}bg-success{% endif %}">
                <i class="bi bi-file-earmark-text me-2"></i> Payslips
            </a>
        {% endif %}
    </div>

    <!-- Logout Section -->
    <div class="sidebar-footer p-3 mt-auto border-top border-secondary">
        <a href="{% url 'logout' %}" class="nav-link text-danger text-center fw-bold d-flex justify-content-center align-items-center">
            <i class="bi bi-box-arrow-left me-2"></i> Logout
        </a>
    </div>
</div>
